worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # --------------------------------------------------------------------------
  # Upstream pool: three backend Node.js / Socket.IO nodes.
  #
  # ip_hash:
  #   Pins a given client IP to a single backend so the WebSocket handshake
  #   (HTTP Upgrade + subsequent frames) consistently lands on the same node.
  #   This is the simplest correct way to run Socket.IO behind a multi-node
  #   load balancer.
  #
  # Horizontal scalability is preserved by the Socket.IO Redis adapter: any
  # event published on one node is delivered to clients connected to the
  # other nodes via Redis pub/sub. Stickiness is a concern of the handshake;
  # cross-node fan-out is solved by Redis.
  #
  # Failover:
  #   If a backend is unreachable, Nginx automatically retries the next
  #   upstream (max_fails / fail_timeout below). This is the project's
  #   "automatic failover" requirement.
  # --------------------------------------------------------------------------
  upstream chat_backend {
    ip_hash;
    server backend-1:3000 max_fails=3 fail_timeout=10s;
    server backend-2:3000 max_fails=3 fail_timeout=10s;
    server backend-3:3000 max_fails=3 fail_timeout=10s;
  }

  # Required for the WebSocket Upgrade dance.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;
    server_name _;

    # Reasonable default request size for JSON payloads.
    client_max_body_size 1m;

    location / {
      proxy_pass http://chat_backend;

      # HTTP/1.1 + Upgrade headers are required for WebSockets.
      proxy_http_version 1.1;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;

      # Forwarded headers — let the backend see the real client.
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # WebSocket connections can be long-lived; raise timeouts.
      proxy_read_timeout  3600s;
      proxy_send_timeout  3600s;

      # Skip a dead backend on connection errors and try the next upstream.
      proxy_next_upstream error timeout http_502 http_503 http_504;
    }
  }
}
