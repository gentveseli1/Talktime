services:
  postgres-primary:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chat}
      POSTGRES_DB: ${POSTGRES_DB:-chat}
      # Read by primary-init.sh during initdb to create the replication role.
      REPLICATION_USER: ${REPLICATION_USER:-replicator}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-replicator-pw}
    # Enable WAL streaming and a few headroom settings for the replica.
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "hot_standby=on"
      - "-c"
      - "wal_keep_size=64MB"
      - "-c"
      - "listen_addresses=*"
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
      - ./infra/postgres/primary-init.sh:/docker-entrypoint-initdb.d/10-replication.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chat} -d ${POSTGRES_DB:-chat}"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres-replica:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      # The replica re-uses the superuser password so direct read queries
      # from outside (e.g. `psql` for the demo) work the same way.
      POSTGRES_USER: ${POSTGRES_USER:-chat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chat}
      POSTGRES_DB: ${POSTGRES_DB:-chat}
      REPLICATION_USER: ${REPLICATION_USER:-replicator}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-replicator-pw}
      PRIMARY_HOST: postgres-primary
      PRIMARY_PORT: "5432"
      PGDATA: /var/lib/postgresql/data
    entrypoint: ["/bin/bash", "/usr/local/bin/replica-entrypoint.sh"]
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./infra/postgres/replica-entrypoint.sh:/usr/local/bin/replica-entrypoint.sh:ro
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      # `pg_isready` returns 0 once the standby has accepted connections,
      # which is what we want from a "replica is up" check.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chat} -d ${POSTGRES_DB:-chat}"]
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend-1:
    build: ./backend
    restart: unless-stopped
    environment:
      NODE_ID: node-1
      PORT: 3000
      # All backend writes go to the primary. Replicas are read-only and
      # never receive direct application writes — they catch up via WAL.
      DATABASE_URL: postgresql://${POSTGRES_USER:-chat}:${POSTGRES_PASSWORD:-chat}@postgres-primary:5432/${POSTGRES_DB:-chat}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-replace-me-with-long-random-string}
      CORS_ORIGIN: http://localhost:5173
      LOG_LEVEL: info
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-2:
    build: ./backend
    restart: unless-stopped
    environment:
      NODE_ID: node-2
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-chat}:${POSTGRES_PASSWORD:-chat}@postgres-primary:5432/${POSTGRES_DB:-chat}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-replace-me-with-long-random-string}
      CORS_ORIGIN: http://localhost:5173
      LOG_LEVEL: info
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-3:
    build: ./backend
    restart: unless-stopped
    environment:
      NODE_ID: node-3
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-chat}:${POSTGRES_PASSWORD:-chat}@postgres-primary:5432/${POSTGRES_DB:-chat}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-replace-me-with-long-random-string}
      CORS_ORIGIN: http://localhost:5173
      LOG_LEVEL: info
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy
      backend-3:
        condition: service_healthy

volumes:
  postgres_primary_data:
  postgres_replica_data:
